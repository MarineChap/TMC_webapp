<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caserne des pompiers de TMC</title>
    <meta name="description"
        content="Site officiel de la brigade de pompiers locale. Servir la communauté avec fierté et détermination.">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Twemoji -->
    <script src="https://unpkg.com/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Header Section -->
    <header>
        <div class="logo">
            <!-- Placeholder for Logo Icon -->
            <span role="img" aria-label="Fire Truck Icon" style="font-size: 1.5em; margin-right: 8px;">🚒</span>
            Caserne des pompiers de TMC
        </div>
        <nav>
            <ul style="display: flex; gap: 20px; align-items: center;">
                <li><button id="login-btn" class="edit-btn">Connexion</button></li>
                <li><button id="signup-btn" class="edit-btn">Inscription</button></li>
                <li><button id="logs-btn" class="edit-btn" style="display: none;">Logs</button></li>
                <li><button id="edit-btn" class="edit-btn" style="display: none;">Éditer</button></li>
                <li><button id="logout-btn" class="edit-btn"
                        style="display: none; background-color: #f44336;">Déconnexion</button></li>
            </ul>
        </nav>
    </header>

    <!-- Flash News Banner -->
    <div id="flash-news-container" class="flash-news-container" style="display: none;">
        <div class="flash-news-content"></div>
    </div>

    <div class="page-container">
        <!-- Dashboard Content Grid -->
        <div class="dashboard-grid">
            <!-- Column 1: Info & Events -->
            <aside class="sidebar">

                <!-- Future Event Section -->
                <section id="events" class="future-event">
                    <h2>Événements</h2>
                    <div id="events-container">
                        <!-- Events will be loaded here -->
                    </div>
                </section>
            </aside>

            <!-- Column 2: Messages -->
            <main class="main-content">
                <!-- Chief's Carousel Section -->
                <section id="chief-messages" class="carousel-section">
                    <h2>Messages Encadrement</h2>
                    <div id="chief-carousel" class="carousel-container">
                        <div class="carousel-indicators"></div>
                    </div>
                </section>

                <!-- Amicalist's Carousel Section -->
                <section id="amicalist-messages" class="carousel-section">
                    <h2>Messages Amicale</h2>
                    <div id="amicalist-carousel" class="carousel-container">
                        <div class="carousel-indicators"></div>
                    </div>
                </section>
            </main>

            <!-- Column 3: Recruits -->
            <aside class="recruits-sidebar">
                <!-- Weather Widget -->
                <section id="weather-widget" class="weather-widget">
                    <h2>Météo</h2>
                    <div id="weather-container" class="weather-container">
                        <div class="weather-loading">Chargement...</div>
                    </div>
                </section>

                <section id="recruits" class="carousel-section">
                    <h2>Nouveaux Engagés</h2>
                    <div id="recruits-carousel" class="carousel-container">
                        <div class="carousel-indicators"></div>
                    </div>
                </section>
            </aside>
        </div>

        <!-- SDMIS News Carousel at the bottom -->
        <section id="sdmis-carousel-section">
            <div id="sdmis-carousel">
                <!-- SDMIS Carousel will be loaded here -->
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Caserne TMC - Marine Guyot. Tous droits réservés.</p>
    </footer>

    <!-- Connexion Modal -->
    <div id="login-modal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <span class="close-login-btn"
                style="float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
            <h2>Connexion</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">Nom d'utilisateur :</label>
                    <input type="text" id="login-username" name="username" placeholder="Votre nom d'utilisateur"
                        required>
                </div>
                <div class="form-group">
                    <label for="login-password">Mot de passe :</label>
                    <input type="password" id="login-password" name="password" placeholder="Votre mot de passe"
                        required>
                </div>
                <div class="modal-actions">
                    <button type="submit" id="login-submit-btn" class="btn-save">Se connecter</button>
                    <button type="button" id="login-cancel-btn" class="btn-cancel">Annuler</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Inscription Modal -->
    <div id="signup-modal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <span class="close-signup-btn"
                style="float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
            <h2>Inscription</h2>
            <form id="signup-form">
                <div class="form-group">
                    <label for="signup-username">Nom d'utilisateur :</label>
                    <input type="text" id="signup-username" name="username"
                        placeholder="Choisissez un nom d'utilisateur" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Mot de passe :</label>
                    <input type="password" id="signup-password" name="password"
                        placeholder="Mot de passe (min 6 caractères)" required>
                </div>
                <div class="modal-actions">
                    <button type="submit" id="signup-submit-btn" class="btn-save">S'inscrire</button>
                    <button type="button" id="signup-cancel-btn" class="btn-cancel">Annuler</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Ajouter un nouvel élément</h2>
            <div class="form-group">
                <label for="category-select">Catégorie :</label>
                <select id="category-select">
                    <option value="">Sélectionnez une catégorie...</option>
                    <option value="chiefMessages">Message de l'Encadrement</option>
                    <option value="amicalistMessages">Message de l'Amicale</option>
                    <option value="recruits">Nouvel Engagé</option>
                    <option value="events">Événement</option>
                    <option value="flashNews">Flash Info</option>
                </select>
            </div>
            <div id="dynamic-form">
                <!-- Dynamic inputs will be injected here -->
            </div>
            <div class="modal-actions">
                <button id="save-btn" class="btn-save" disabled>Sauvegarder</button>
                <button id="cancel-btn" class="btn-cancel">Annuler</button>
            </div>
        </div>
    </div>

    <!-- Logs Modal -->
    <div id="logs-modal" class="modal">
        <div class="modal-content" style="max-width: 900px; max-height: 80vh; overflow-y: auto;">
            <span class="close-logs-btn"
                style="float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
            <h2>Journaux d'activité (Logs)</h2>
            <div id="logs-list">
                <!-- Logs will be loaded here -->
            </div>
            <div class="modal-actions">
                <button id="close-logs-footer-btn" class="btn-cancel">Fermer</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/src/client/script.ts"></script>
</body>

</html>
